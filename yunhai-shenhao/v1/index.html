<section id="yunhai-shenhao-app" class="yh-shell">
  <style>
    :root {
      --yh-bg: #080706;
      --yh-panel: rgba(22, 18, 13, 0.92);
      --yh-panel-soft: rgba(41, 32, 22, 0.78);
      --yh-gold: #d8b35a;
      --yh-gold-soft: #f0d995;
      --yh-line: rgba(216, 179, 90, 0.34);
      --yh-text: #f7f1df;
      --yh-muted: #aa9b82;
      --yh-risk: #e06b5f;
      --yh-ok: #65c18c;
      --yh-shadow: rgba(0, 0, 0, 0.45);
      color-scheme: dark;
    }

    #yunhai-shenhao-app {
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      color: var(--yh-text);
      background:
        radial-gradient(circle at 15% 0%, rgba(216, 179, 90, 0.18), transparent 32%),
        linear-gradient(135deg, #050403 0%, #14100b 42%, #050403 100%);
      border: 1px solid var(--yh-line);
      box-shadow: 0 18px 48px var(--yh-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      overflow: hidden;
      max-width: 980px;
      margin: 0 auto;
    }

    .yh-topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--yh-line);
      background: rgba(0, 0, 0, 0.28);
    }

    .yh-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .yh-title strong {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--yh-gold-soft);
    }

    .yh-title span,
    .yh-clock {
      color: var(--yh-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .yh-clock {
      text-align: right;
      white-space: nowrap;
    }

    .yh-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(280px, 0.88fr);
      gap: 14px;
      padding: 14px;
    }

    .yh-panel {
      background: var(--yh-panel);
      border: 1px solid var(--yh-line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }

    .yh-panel h3 {
      margin: 0 0 12px;
      color: var(--yh-gold-soft);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .yh-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .yh-metric {
      min-height: 74px;
      background: var(--yh-panel-soft);
      border: 1px solid rgba(216, 179, 90, 0.22);
      border-radius: 6px;
      padding: 10px;
    }

    .yh-metric span {
      display: block;
      color: var(--yh-muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .yh-metric strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .yh-map {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .yh-lineitem {
      border-top: 1px solid rgba(216, 179, 90, 0.16);
      padding-top: 10px;
      margin-top: 10px;
      color: var(--yh-text);
      font-size: 13px;
      line-height: 1.55;
    }

    .yh-lineitem:first-child {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    .yh-muted {
      color: var(--yh-muted);
    }

    .yh-harem {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .yh-card {
      background: rgba(7, 6, 5, 0.56);
      border: 1px solid rgba(216, 179, 90, 0.2);
      border-radius: 7px;
      padding: 10px;
      min-width: 0;
    }

    .yh-card strong {
      color: var(--yh-gold-soft);
      font-size: 14px;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .yh-card small {
      color: var(--yh-muted);
      display: block;
      margin: 4px 0 9px;
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .yh-bar {
      height: 7px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
      margin: 6px 0;
    }

    .yh-bar i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8c6a2c, var(--yh-gold-soft));
    }

    .yh-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .yh-tag {
      border: 1px solid rgba(216, 179, 90, 0.24);
      border-radius: 99px;
      padding: 4px 8px;
      color: var(--yh-muted);
      font-size: 12px;
      line-height: 1.3;
      background: rgba(0, 0, 0, 0.18);
    }

    .yh-feed {
      max-height: 190px;
      overflow: auto;
      padding-right: 4px;
    }

    .yh-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .yh-option {
      background: rgba(216, 179, 90, 0.09);
      border: 1px solid rgba(216, 179, 90, 0.28);
      color: var(--yh-text);
      border-radius: 6px;
      padding: 10px;
      text-align: left;
      font: inherit;
      cursor: pointer;
      min-height: 46px;
    }

    .yh-option:hover {
      background: rgba(216, 179, 90, 0.16);
      border-color: rgba(240, 217, 149, 0.54);
    }

    .yh-story {
      line-height: 1.72;
      font-size: 14px;
      color: var(--yh-text);
      max-height: 260px;
      overflow: auto;
    }

    .yh-fallback {
      color: var(--yh-muted);
      line-height: 1.65;
      font-size: 14px;
    }

    @media (max-width: 820px) {
      .yh-grid,
      .yh-map {
        grid-template-columns: 1fr;
      }

      .yh-metrics,
      .yh-harem,
      .yh-options {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .yh-topbar {
        grid-template-columns: 1fr;
      }

      .yh-clock {
        text-align: left;
        white-space: normal;
      }
    }

    @media (max-width: 520px) {
      .yh-metrics,
      .yh-harem,
      .yh-options {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="yh-topbar">
    <div class="yh-title">
      <strong>云海神豪系统</strong>
      <span id="yh-subtitle">黑金名利场 · 资产与关系闭环</span>
    </div>
    <div class="yh-clock" id="yh-clock">读取世界状态中...</div>
  </div>

  <div class="yh-grid">
    <div class="yh-panel">
      <h3>资产仪表盘</h3>
      <div class="yh-metrics">
        <div class="yh-metric"><span>现金</span><strong id="yh-cash">--</strong></div>
        <div class="yh-metric"><span>总资产</span><strong id="yh-assets">--</strong></div>
        <div class="yh-metric"><span>声望</span><strong id="yh-reputation">--</strong></div>
        <div class="yh-metric"><span>风险</span><strong id="yh-risk">--</strong></div>
      </div>
      <div class="yh-lineitem" id="yh-action">当前行动：等待剧情推进</div>
    </div>

    <div class="yh-panel">
      <h3>城市与行程</h3>
      <div class="yh-map">
        <div class="yh-lineitem"><span class="yh-muted">地点</span><br><span id="yh-location">--</span></div>
        <div class="yh-lineitem"><span class="yh-muted">天气</span><br><span id="yh-weather">--</span></div>
      </div>
      <div class="yh-lineitem"><span class="yh-muted">主线</span><br><span id="yh-mainline">--</span></div>
    </div>
  </div>

  <div class="yh-grid">
    <div class="yh-panel">
      <h3>本轮剧情</h3>
      <div class="yh-story" id="yh-story">
        <p class="yh-fallback">若你看到这段文字，说明外链前端已载入，正在等待从最后一条消息读取剧情与变量。</p>
      </div>
    </div>

    <div class="yh-panel">
      <h3>行动选项</h3>
      <div class="yh-options" id="yh-options"></div>
    </div>
  </div>

  <div class="yh-grid">
    <div class="yh-panel">
      <h3>女主关系</h3>
      <div class="yh-harem" id="yh-harem"></div>
    </div>

    <div class="yh-panel">
      <h3>事件日志</h3>
      <div class="yh-feed" id="yh-events"></div>
    </div>
  </div>

  <div class="yh-panel" style="margin: 0 14px 14px;">
    <h3>产业版图</h3>
    <div class="yh-tags" id="yh-industries"></div>
  </div>

  <script>
    (() => {
      const $root = document.getElementById('yunhai-shenhao-app');
      const clamp = (value, min, max) => Math.max(min, Math.min(max, Number(value || 0)));
      const fmtMoney = value => {
        const n = Number(value || 0);
        if (n >= 100000000) return `¥${(n / 100000000).toFixed(2)}亿`;
        if (n >= 10000) return `¥${(n / 10000).toFixed(1)}万`;
        return `¥${n.toLocaleString('zh-CN')}`;
      };
      const safeText = value => String(value ?? '').replace(/[<>&]/g, s => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[s]));
      const lastMes = () => document.querySelector('#chat .mes.last_mes') || $root.closest('.mes') || document.body;
      const decodeHtml = html => {
        const textarea = document.createElement('textarea');
        textarea.innerHTML = html;
        return textarea.value;
      };
      const rawMessage = () => {
        const hiddenRaw = document.querySelector('#yh-raw-message');
        if (hiddenRaw) {
          if (hiddenRaw.tagName === 'TEXTAREA') {
            return hiddenRaw.value || hiddenRaw.textContent || '';
          }
          if (hiddenRaw.tagName === 'TEMPLATE') {
            const html = hiddenRaw.innerHTML || hiddenRaw.content?.textContent || '';
            return decodeHtml(html);
          }
          return decodeHtml(hiddenRaw.innerHTML || hiddenRaw.textContent || '');
        }
        const node = lastMes();
        const clone = node.cloneNode(true);
        clone.querySelectorAll('#yunhai-shenhao-app, style, script').forEach(el => el.remove());
        return decodeHtml(clone.innerHTML || clone.textContent || '');
      };
      const tag = (name, source) => {
        const normalized = source
          .replace(/&lt;/g, '<')
          .replace(/&gt;/g, '>')
          .replace(/&amp;/g, '&');
        const match = normalized.match(new RegExp(`<${name}[^>]*>([\\s\\S]*?)<\\/${name}>`, 'i'));
        return match ? match[1].trim() : '';
      };
      const parseOptions = source => {
        const body = tag('option', source);
        return body
          .split(/\n+/)
          .map(x => x.trim())
          .filter(Boolean)
          .filter(x => /^[a-d]\./i.test(x))
          .slice(0, 4);
      };
      const readStatData = () => {
        const candidates = [
          window.stat_data,
          window.yunhaiStatData,
          window.__YUNHAI_STAT_DATA__,
          window.TavernHelper?.variables?.stat_data,
        ];
        return candidates.find(x => x && typeof x === 'object') || {};
      };
      const render = () => {
        const data = readStatData();
        const world = data.世界信息 || {};
        const actor = data.主角信息 || {};
        const assets = data.资产信息 || {};
        const action = data.角色行动 || {};
        const ability = data.能力信息 || {};
        const relations = data.女主关系 || {};
        const industries = data.产业信息 || {};
        const events = Array.isArray(data.事件日志) ? data.事件日志 : [];
        const raw = rawMessage();
        const story = tag('maintext', raw) || tag('sum', raw) || '';
        const options = parseOptions(raw);

        document.getElementById('yh-clock').textContent = `${world.当前日期 || '云海纪元'} · ${world.当前时间 || '未知时间'}`;
        document.getElementById('yh-cash').textContent = fmtMoney(assets.现金 ?? actor.现金);
        document.getElementById('yh-assets').textContent = fmtMoney(assets.总资产);
        document.getElementById('yh-reputation').textContent = `${clamp(actor.声望, 0, 100)} / 100`;
        document.getElementById('yh-risk').textContent = `${clamp(actor.风险值, 0, 100)} / 100`;
        document.getElementById('yh-location').textContent = action.当前位置 || world.当前地点 || '云海市';
        document.getElementById('yh-weather').textContent = world.天气 || '晴';
        document.getElementById('yh-mainline').textContent = world.当前主线 || '黑金名利场开局';
        document.getElementById('yh-action').textContent = `当前行动：${action.当前行为 || '等待玩家选择'}｜目标：${action.当前目标 || '建立第一块商业版图'}`;
        document.getElementById('yh-story').innerHTML = story
          ? safeText(story).replace(/\n/g, '<br>')
          : '<p class="yh-fallback">未检测到 &lt;maintext&gt;。如果这是首轮或外链刚载入，可以继续发送“开始游戏”。</p>';

        document.getElementById('yh-options').innerHTML = options.length
          ? options.map(opt => `<button class="yh-option" data-option="${safeText(opt)}">${safeText(opt)}</button>`).join('')
          : '<div class="yh-fallback">未检测到 &lt;option&gt;。保底可输入：查看资产、参加晚宴、约见沈清璃、休息。</div>';

        document.querySelectorAll('.yh-option').forEach(btn => {
          btn.addEventListener('click', () => {
            const input = document.querySelector('#send_textarea, textarea[name="send_textarea"], textarea');
            if (input) {
              input.value = btn.dataset.option || btn.textContent;
              input.dispatchEvent(new Event('input', { bubbles: true }));
            }
          });
        });

        const relationEntries = Object.entries(relations).slice(0, 5);
        document.getElementById('yh-harem').innerHTML = relationEntries.length
          ? relationEntries.map(([name, r]) => {
            const like = clamp((Number(r.好感 || 0) + 100) / 2, 0, 100);
            const trust = clamp((Number(r.信任 || 0) + 100) / 2, 0, 100);
            return `<div class="yh-card">
              <strong>${safeText(name)}</strong>
              <small>${safeText(r.关系阶段 || r.身份 || '未建立关系')}</small>
              <div class="yh-muted">好感</div><div class="yh-bar"><i style="width:${like}%"></i></div>
              <div class="yh-muted">信任</div><div class="yh-bar"><i style="width:${trust}%"></i></div>
            </div>`;
          }).join('')
          : '<div class="yh-fallback">女主关系尚未初始化。</div>';

        const industryEntries = Object.entries(industries);
        document.getElementById('yh-industries').innerHTML = industryEntries.length
          ? industryEntries.map(([name, item]) => `<span class="yh-tag">${safeText(name)} · Lv.${safeText(item.等级 ?? 0)} · ${safeText(item.状态 || '筹备')}</span>`).join('')
          : '<span class="yh-tag">暂无产业</span>';

        document.getElementById('yh-events').innerHTML = events.length
          ? events.slice(-8).reverse().map(e => `<div class="yh-lineitem">${safeText(typeof e === 'string' ? e : `${e.时间 || ''} ${e.内容 || e.事件 || ''}`)}</div>`).join('')
          : '<div class="yh-fallback">暂无事件日志。</div>';
      };
      render();
      setTimeout(render, 500);
      setTimeout(render, 1500);
    })();
  </script>
</section>
